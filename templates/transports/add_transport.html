{% extends 'base.html' %}
{% block content %}
<div class="container py-4" style="max-width:720px">
  <h3>Add a new {{ profile.get_transport_kind_display }}</h3>
  <form method="post" enctype="multipart/form-data" class="card op-card mt-3">
    {% csrf_token %}
    <div class="card-body row g-3">
      <div class="col-md-8"><label class="form-label">Name</label><input class="form-control" name="name" required></div>
      <div class="col-md-4"><label class="form-label">Registration #</label><input class="form-control" name="registration_no"></div>
      {% if profile.transport_kind == 'bus' %}
      <div class="col-md-6">
        <label class="form-label">Bus type <span class="text-danger">*</span></label>
        <select class="form-select" name="bus_type" required>
          <option value="">— Choose bus type —</option>
          {% for code, label in bus_types %}
            <option value="{{ code }}">{{ label }}</option>
          {% endfor %}
        </select>
        <div class="form-text">AC, Non-AC, Sleeper or Hyundai</div>
      </div>
      {% endif %}
      <div class="col-md-4"><label class="form-label">Total seats</label><input class="form-control" name="total_seats" type="number" value="40" required></div>
      <div class="col-md-4"><label class="form-label">Seats per row</label><input class="form-control" name="seats_per_row" type="number" value="4" required></div>
      <div class="col-md-4 d-flex align-items-end">
        <div class="form-check"><input class="form-check-input" type="checkbox" id="vip" name="has_vip_section">
          <label class="form-check-label" for="vip">Has VIP section</label></div>
      </div>
      <div class="col-12"><label class="form-label">Image</label><input type="file" class="form-control" name="image" accept="image/*"></div>
    </div>
    <div class="card-footer text-end"><button class="btn btn-danger">Save transport</button></div>
  </form>
</div>
{% endblock %}
